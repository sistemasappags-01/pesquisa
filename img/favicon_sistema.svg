<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f2650"/>
      <stop offset="100%" stop-color="#1e4080"/>
    </linearGradient>
    <linearGradient id="b1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#b88000"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#c49600"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#d4a500"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
  </defs>

  <!-- Fundo navy rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Brilho sutil no topo -->
  <ellipse cx="16" cy="6" rx="12" ry="5" fill="rgba(255,255,255,0.07)"/>

  <!-- Quadrado dourado outline — em vez de balão -->
  <rect x="4" y="4" width="24" height="22" rx="4"
    fill="rgba(245,200,66,0.08)"
    stroke="#f5c842"
    stroke-width="1.8"/>

  <!-- Pessoas/barras centralizadas no quadrado -->
  <!-- Pessoa 1 — menor -->
  <circle cx="10"  cy="15"   r="2"   fill="url(#b1)" opacity="0.78"/>
  <rect   x="8"   y="17.5"  width="4"   height="5"   rx="1.2" fill="url(#b1)" opacity="0.78"/>

  <!-- Pessoa 2 — média -->
  <circle cx="16"  cy="12.5" r="2.2" fill="url(#b2)"/>
  <rect   x="13.8" y="15.2" width="4.4" height="7.3" rx="1.3" fill="url(#b2)"/>

  <!-- Pessoa 3 — maior -->
  <circle cx="22.5" cy="10"  r="2.5" fill="url(#b3)"/>
  <rect   x="20"   y="13"   width="5"   height="9.5" rx="1.5" fill="url(#b3)"/>

  <!-- Linha de base dourada -->
  <line x1="5.5" y1="27" x2="26.5" y2="27"
    stroke="#f5c842" stroke-width="1.5" stroke-linecap="round" opacity="0.60"/>
</svg>
