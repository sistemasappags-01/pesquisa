<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Respostas — RC Sobradinho</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle'>🍽️%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --azul:#2563eb; --azul-foco:rgba(37,99,235,0.14);
      --verde:#059669; --verde-light:rgba(5,150,105,0.08);
      --amarelo:#d97706; --amarelo-light:rgba(217,119,6,0.08);
      --vermelho:#e11d48; --vermelho-light:rgba(225,29,72,0.08);
      --cafe:#ea580c; --almoco:#0891b2; --jantar:#7c3aed;
      --page-bg:#f8fafc; --surface:#fff; --surface2:#f1f5f9;
      --border:#e2e8f0; --tx1:#0f172a; --tx2:#64748b; --tx3:#94a3b8;
      --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
      --shadow-md:0 4px 16px rgba(0,0,0,0.08);
    }
    @media(prefers-color-scheme:dark){:root{
      --azul:#60a5fa; --verde:#34d399; --amarelo:#fbbf24; --vermelho:#fb7185;
      --cafe:#fb923c; --almoco:#22d3ee; --jantar:#a78bfa;
      --page-bg:#09090b; --surface:#18181b; --surface2:#27272a;
      --border:#3f3f46; --tx1:#fafafa; --tx2:#a1a1aa; --tx3:#52525b;
    }}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--page-bg);color:var(--tx1);min-height:100vh;}

    /* NAV */
    .nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);height:56px;display:flex;align-items:center;padding:0 24px;gap:16px;}
    .nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;color:var(--tx1);text-decoration:none;}
    .nav-bar-line{width:3px;height:22px;background:var(--azul);border-radius:99px;}
    .nav-links{display:flex;gap:4px;margin-left:8px;}
    .nav-link{padding:5px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--tx2);text-decoration:none;transition:all 0.15s;}
    .nav-link:hover{background:var(--surface2);color:var(--tx1);}
    .nav-link.ativo{background:var(--azul);color:#fff;}
    .nav-link.admin-link{display:none;}
    .nav-direita{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .nav-usuario{font-size:12px;color:var(--tx3);}
    .nav-perfil-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--tx2);border:1px solid var(--border);}
    .btn-sair{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all 0.15s;}
    .btn-sair:hover{border-color:var(--vermelho);color:var(--vermelho);}

    /* MAIN */
    .main{padding:24px;max-width:1400px;margin:0 auto;}

    /* FILTROS */
    .filtros-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:20px;box-shadow:var(--shadow-sm);}
    .filtros-titulo{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:14px;}
    .filtros-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto auto;gap:10px;align-items:end;}
    .filtro-grupo label{display:block;font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
    .filtro-grupo input, .filtro-grupo select{
      width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;
      font-size:13px;font-family:inherit;color:var(--tx1);background:var(--page-bg);outline:none;
      transition:border-color 0.2s;
    }
    .filtro-grupo input:focus, .filtro-grupo select:focus{border-color:var(--azul);}
    .btn-filtrar{padding:8px 18px;background:var(--azul);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;transition:filter 0.15s;align-self:end;}
    .btn-filtrar:hover{filter:brightness(1.08);}
    .btn-exportar{padding:8px 16px;background:var(--surface2);color:var(--tx2);border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all 0.15s;align-self:end;}
    .btn-exportar:hover{border-color:var(--verde);color:var(--verde);}

    /* STATS RÁPIDOS */
    .stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex:1;min-width:120px;box-shadow:var(--shadow-sm);}
    .stat-card .val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--tx1);line-height:1;}
    .stat-card .lbl{font-size:11px;color:var(--tx3);margin-top:3px;font-weight:500;}

    /* TABELA */
    .tabela-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);}
    .tabela-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
    .tabela-header-titulo{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.5px;}
    .tabela-header-info{font-size:12px;color:var(--tx3);font-family:'DM Mono',monospace;}
    .tabela-wrap{overflow-x:auto;}
    .tabela-wrap::-webkit-scrollbar{height:4px;}
    .tabela-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--tx3);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;}
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s;}
    tbody tr:hover{background:var(--surface2);}
    tbody tr:last-child{border-bottom:none;}
    tbody td{padding:11px 14px;vertical-align:top;}
    .td-data{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);white-space:nowrap;}
    .td-obs{color:var(--tx2);line-height:1.5;word-break:break-word;}
    .td-pessoal{font-size:12px;color:var(--tx2);}
    .td-pessoal .oculto{font-style:italic;color:var(--tx3);}

    /* badges */
    .nota-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap;}
    .nota-badge.otimo  {background:var(--verde-light);  color:var(--verde);}
    .nota-badge.bom    {background:rgba(16,185,129,0.08);color:#10b981;}
    .nota-badge.regular{background:var(--amarelo-light); color:var(--amarelo);}
    .nota-badge.ruim   {background:var(--vermelho-light);color:var(--vermelho);}
    .periodo-badge{display:inline-flex;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;}
    .periodo-badge.cafe  {background:rgba(234,88,12,0.10); color:var(--cafe);}
    .periodo-badge.almoco{background:rgba(8,145,178,0.10); color:var(--almoco);}
    .periodo-badge.jantar{background:rgba(124,58,237,0.10);color:var(--jantar);}

    /* paginação */
    .paginacao{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--border);}
    .pag-info{font-size:12px;color:var(--tx3);font-family:'DM Mono',monospace;}
    .pag-btns{display:flex;gap:6px;}
    .pag-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all 0.15s;}
    .pag-btn:hover:not(:disabled){border-color:var(--azul);color:var(--azul);}
    .pag-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .pag-btn.ativo{background:var(--azul);border-color:var(--azul);color:#fff;}

    /* loading */
    .loading{text-align:center;padding:40px;color:var(--tx3);font-size:14px;}
    .spinner-sm{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--azul);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:768px){
      .filtros-grid{grid-template-columns:1fr 1fr;}
      .btn-filtrar,.btn-exportar{grid-column:span 1;}
      .stats-row{gap:8px;}
      .stat-card{min-width:90px;}
      .nav-links{display:none;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="dashboard.html">
    <div class="nav-bar-line"></div>
    RC Sobradinho
  </a>
  <div class="nav-links">
    <a class="nav-link" href="dashboard.html">📊 Dashboard</a>
    <a class="nav-link ativo" href="respostas.html">📋 Respostas</a>
    <a class="nav-link admin-link" id="nav-admin" href="admin.html">👥 Usuários</a>
  </div>
  <div class="nav-direita">
    <span class="nav-usuario" id="nav-nome"></span>
    <span class="nav-perfil-badge" id="nav-perfil"></span>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</nav>

<div class="main">

  <!-- FILTROS -->
  <div class="filtros-card">
    <div class="filtros-titulo">🔍 Filtros de busca</div>
    <div class="filtros-grid">
      <div class="filtro-grupo">
        <label>Data início</label>
        <input type="date" id="f-inicio">
      </div>
      <div class="filtro-grupo">
        <label>Data fim</label>
        <input type="date" id="f-fim">
      </div>
      <div class="filtro-grupo">
        <label>Refeição</label>
        <select id="f-refeicao">
          <option value="">Todas</option>
          <option>Café da Manhã</option>
          <option>Almoço</option>
          <option>Jantar</option>
        </select>
      </div>
      <div class="filtro-grupo">
        <label>Nota mínima</label>
        <select id="f-nota">
          <option value="">Todas</option>
          <option value="negativa">Apenas negativas (Regular/Ruim)</option>
          <option value="Ruim">Apenas Ruim</option>
          <option value="Regular">Apenas Regular</option>
          <option value="positiva">Apenas positivas (Ótimo/Bom)</option>
        </select>
      </div>
      <button class="btn-filtrar" onclick="buscar()">🔍 Filtrar</button>
      <button class="btn-exportar" onclick="exportarCSV()">⬇️ Exportar CSV</button>
    </div>
  </div>

  <!-- STATS RÁPIDOS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="val" id="st-total">—</div><div class="lbl">Respostas</div></div>
    <div class="stat-card"><div class="val" id="st-positivas" style="color:var(--verde)">—</div><div class="lbl">Avaliações positivas</div></div>
    <div class="stat-card"><div class="val" id="st-negativas" style="color:var(--vermelho)">—</div><div class="lbl">Avaliações negativas</div></div>
    <div class="stat-card"><div class="val" id="st-obs">—</div><div class="lbl">Com observação</div></div>
    <div class="stat-card"><div class="val" id="st-id">—</div><div class="lbl">Identificadas</div></div>
  </div>

  <!-- TABELA -->
  <div class="tabela-card">
    <div class="tabela-header">
      <span class="tabela-header-titulo">Respostas na íntegra</span>
      <span class="tabela-header-info" id="tabela-info">—</span>
    </div>
    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>Data/Hora</th>
            <th>Refeição</th>
            <th>🍽️ Qualidade</th>
            <th>👋 Atendimento</th>
            <th>🧹 Ambiente</th>
            <th class="col-pessoal">Nome / Telefone</th>
            <th>Observações</th>
          </tr>
        </thead>
        <tbody id="tabela-corpo">
          <tr><td colspan="7" class="loading"><span class="spinner-sm"></span>Carregando…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="paginacao" id="paginacao">
      <span class="pag-info" id="pag-info"></span>
      <div class="pag-btns" id="pag-btns"></div>
    </div>
  </div>

</div>

<script>
  // ═══════════════════════════════════════════════════
  //  ⚠️  COLE AQUI AS SUAS CREDENCIAIS DO SUPABASE
  // ═══════════════════════════════════════════════════
  const SUPABASE_URL = 'https://kosiqdzgyutdsexclzvk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtvc2lxZHpneXV0ZHNleGNsenZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjQyMTIsImV4cCI6MjA5MzAwMDIxMn0.Aq4ZExIo8O82eB0B2-t8Nh-NyBfCm3sb1vRhutlLOFo';
  // ═══════════════════════════════════════════════════

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const POR_PAGINA = 50;
  let paginaAtual  = 1;
  let totalRegistros = 0;
  let dadosFiltrados = [];
  let perfilUsuario  = null;

  // ── Autenticação ──────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const { data: { session: sessAtual } } = await sb.auth.getSession();
    const tokenAtual = sessAtual?.access_token || SUPABASE_KEY;

    const perfilRows = await fetch(
      `${SUPABASE_URL}/rest/v1/perfis?id=eq.${session.user.id}&select=*`,
      {
        headers: {
          'apikey':        SUPABASE_KEY,
          'Authorization': `Bearer ${tokenAtual}`,
          'Accept':        'application/json'
        }
      }
    ).then(r => r.json()).catch(() => []);

    const perfil = perfilRows && perfilRows.length > 0 ? perfilRows[0] : null;

    if (!perfil || !perfil.ativo) { await sb.auth.signOut(); window.location.href = 'login.html'; return; }

    perfilUsuario = perfil;
    document.getElementById('nav-nome').textContent   = perfil.nome;
    document.getElementById('nav-perfil').textContent = perfil.perfil.toUpperCase();

    // Mostra link admin só para admin
    if (perfil.perfil === 'admin') {
      document.getElementById('nav-admin').style.display = 'flex';
    }

    // Visualizador não vê dados pessoais
    if (perfil.perfil === 'visualizador') {
      document.querySelectorAll('.col-pessoal').forEach(el => el.style.display = 'none');
    }

    // Datas padrão: mês atual
    const hoje  = new Date();
    const inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
    document.getElementById('f-inicio').value = inicio.toISOString().split('T')[0];
    document.getElementById('f-fim').value    = hoje.toISOString().split('T')[0];

    buscar();
  }

  async function sair() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  // ── Buscar dados ──────────────────────────────────
  async function buscar() {
    paginaAtual = 1;
    const tbody = document.getElementById('tabela-corpo');
    tbody.innerHTML = '<tr><td colspan="7" class="loading"><span class="spinner-sm"></span>Buscando…</td></tr>';

    let query = sb.from('respostas').select('*').order('created_at', { ascending: false });

    const inicio = document.getElementById('f-inicio').value;
    const fim    = document.getElementById('f-fim').value;
    const ref    = document.getElementById('f-refeicao').value;
    const nota   = document.getElementById('f-nota').value;

    if (inicio) query = query.gte('created_at', inicio + 'T00:00:00');
    if (fim)    query = query.lte('created_at', fim    + 'T23:59:59');
    if (ref)    query = query.eq('periodo', ref);

    const { data, error } = await query;

    if (error) {
      tbody.innerHTML = `<tr><td colspan="7" class="loading">❌ Erro: ${error.message}</td></tr>`;
      return;
    }

    let dados = data || [];

    // Filtro por nota (client-side)
    if (nota === 'negativa') {
      dados = dados.filter(d => ['Regular','Ruim'].some(n =>
        [d.refeicao,d.atendimento,d.ambiente].includes(n)));
    } else if (nota === 'positiva') {
      dados = dados.filter(d => ['Ótima','Ótimo','Boa','Bom'].some(n =>
        [d.refeicao,d.atendimento,d.ambiente].includes(n)));
    } else if (nota === 'Ruim' || nota === 'Regular') {
      dados = dados.filter(d =>
        [d.refeicao,d.atendimento,d.ambiente].includes(nota));
    }

    dadosFiltrados = dados;
    totalRegistros = dados.length;

    atualizarStats(dados);
    renderizarPagina();
  }

  function atualizarStats(dados) {
    const totalAv = dados.length * 3;
    const pos = dados.reduce((a,d)=>a+[d.refeicao,d.atendimento,d.ambiente]
      .filter(n=>['Ótima','Ótimo','Boa','Bom'].includes(n)).length, 0);
    const neg = dados.reduce((a,d)=>a+[d.refeicao,d.atendimento,d.ambiente]
      .filter(n=>['Regular','Ruim'].includes(n)).length, 0);

    document.getElementById('st-total').textContent     = dados.length;
    document.getElementById('st-positivas').textContent = totalAv ? Math.round(pos/totalAv*100)+'%' : '—';
    document.getElementById('st-negativas').textContent = totalAv ? Math.round(neg/totalAv*100)+'%' : '—';
    document.getElementById('st-obs').textContent       = dados.filter(d=>d.observacoes).length;
    document.getElementById('st-id').textContent        = dados.filter(d=>d.nome).length;
  }

  function renderizarPagina() {
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = dadosFiltrados.slice(inicio, inicio + POR_PAGINA);
    const tbody  = document.getElementById('tabela-corpo');
    const ocultaPessoal = perfilUsuario?.perfil === 'visualizador';

    document.getElementById('tabela-info').textContent =
      `${totalRegistros} registro${totalRegistros !== 1 ? 's' : ''}`;

    if (pagina.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="loading">Nenhuma resposta encontrada para os filtros selecionados.</td></tr>';
      renderizarPaginacao();
      return;
    }

    const periodoCss = {'Café da Manhã':'cafe','Almoço':'almoco','Jantar':'jantar'};

    tbody.innerHTML = pagina.map(r => {
      const dt  = new Date(r.created_at);
      const fmt = dt.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<tr>
        <td class="td-data">${fmt}</td>
        <td>${r.periodo ? `<span class="periodo-badge ${periodoCss[r.periodo]||''}">${r.periodo}</span>` : '—'}</td>
        <td><span class="nota-badge ${classeNota(r.refeicao)}">${r.refeicao||'—'}</span></td>
        <td><span class="nota-badge ${classeNota(r.atendimento)}">${r.atendimento||'—'}</span></td>
        <td><span class="nota-badge ${classeNota(r.ambiente)}">${r.ambiente||'—'}</span></td>
        <td class="td-pessoal col-pessoal" ${ocultaPessoal?'style="display:none"':''}>
          ${ocultaPessoal
            ? '<span class="oculto">Oculto</span>'
            : `<div>${r.nome||'<span style="color:var(--tx3);font-style:italic">Anônimo</span>'}</div>
               <div style="font-size:11px;color:var(--tx3)">${r.telefone||''}</div>`}
        </td>
        <td class="td-obs">${r.observacoes||'<span style="color:var(--tx3);font-style:italic">—</span>'}</td>
      </tr>`;
    }).join('');

    renderizarPaginacao();
  }

  function renderizarPaginacao() {
    const totalPaginas = Math.ceil(totalRegistros / POR_PAGINA);
    const inicio = (paginaAtual-1)*POR_PAGINA + 1;
    const fim    = Math.min(paginaAtual*POR_PAGINA, totalRegistros);

    document.getElementById('pag-info').textContent =
      totalRegistros > 0 ? `${inicio}–${fim} de ${totalRegistros}` : '';

    const btns = document.getElementById('pag-btns');
    btns.innerHTML = '';

    const btn = (txt, pag, disabled=false, ativo=false) => {
      const b = document.createElement('button');
      b.className = 'pag-btn' + (ativo?' ativo':'');
      b.textContent = txt;
      b.disabled    = disabled;
      b.onclick     = () => { paginaAtual = pag; renderizarPagina(); window.scrollTo({top:0,behavior:'smooth'}); };
      return b;
    };

    btns.appendChild(btn('← Anterior', paginaAtual-1, paginaAtual===1));

    // páginas numeradas (máx 5)
    const range = [];
    for (let p = Math.max(1, paginaAtual-2); p <= Math.min(totalPaginas, paginaAtual+2); p++) range.push(p);
    range.forEach(p => btns.appendChild(btn(p, p, false, p===paginaAtual)));

    btns.appendChild(btn('Próxima →', paginaAtual+1, paginaAtual===totalPaginas||totalPaginas===0));
  }

  function classeNota(n) {
    if(['Ótima','Ótimo'].includes(n)) return 'otimo';
    if(['Boa','Bom'].includes(n))     return 'bom';
    if(n==='Regular')                 return 'regular';
    return 'ruim';
  }

  // ── Exportar CSV ─────────────────────────────────
  function exportarCSV() {
    const ocultaPessoal = perfilUsuario?.perfil === 'visualizador';
    const cabecalho = ocultaPessoal
      ? ['Data/Hora','Refeição','Qualidade','Atendimento','Ambiente','Observações']
      : ['Data/Hora','Refeição','Qualidade','Atendimento','Ambiente','Nome','Telefone','Observações'];

    const linhas = dadosFiltrados.map(r => {
      const dt  = new Date(r.created_at).toLocaleString('pt-BR');
      const base = [dt, r.periodo||'', r.refeicao||'', r.atendimento||'', r.ambiente||''];
      if (!ocultaPessoal) base.push(r.nome||'', r.telefone||'');
      base.push(r.observacoes||'');
      return base.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
    });

    const csv  = [cabecalho.join(','), ...linhas].join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');

    const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
    a.href     = url;
    a.download = `respostas_rc_sobradinho_${hoje}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  init();
</script>
</body>
</html>
