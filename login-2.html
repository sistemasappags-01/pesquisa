<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RC Sobradinho</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle'>🍽️%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --azul:       #2563eb;
      --azul-dark:  #1d4ed8;
      --azul-foco:  rgba(37,99,235,0.16);
      --page-bg:    #f8fafc;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --tx1:        #0f172a;
      --tx2:        #64748b;
      --tx3:        #94a3b8;
      --erro-bg:    #fff1f2;
      --erro-border:#fda4af;
      --erro-tx:    #be123c;
      --verde:      #059669;
      --shadow:     0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --azul:      #60a5fa;
        --page-bg:   #09090b;
        --surface:   #18181b;
        --border:    #3f3f46;
        --tx1:       #fafafa;
        --tx2:       #a1a1aa;
        --tx3:       #52525b;
        --erro-bg:   #1c0a0e;
        --erro-border:#9f1239;
        --erro-tx:   #fda4af;
        --verde:     #34d399;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--tx1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border-radius: 16px;
      font-size: 30px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(37,99,235,0.30);
    }

    .logo-titulo {
      font-size: 20px;
      font-weight: 700;
      color: var(--tx1);
      margin-bottom: 3px;
      letter-spacing: -0.3px;
    }

    .logo-subtitulo {
      font-size: 12.5px;
      color: var(--tx3);
    }

    .form-grupo {
      margin-bottom: 16px;
    }

    .form-grupo label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--tx2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-grupo input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--tx1);
      background: var(--page-bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-grupo input::placeholder { color: var(--tx3); }

    .form-grupo input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px var(--azul-foco);
      background: var(--surface);
    }

    .esqueceu {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--azul);
      font-weight: 500;
      margin-top: 6px;
      cursor: pointer;
      text-decoration: none;
    }

    .esqueceu:hover { text-decoration: underline; }

    .erro-msg {
      display: none;
      background: var(--erro-bg);
      border: 1.5px solid var(--erro-border);
      color: var(--erro-tx);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .sucesso-msg {
      display: none;
      background: rgba(5,150,105,0.08);
      border: 1.5px solid rgba(5,150,105,0.25);
      color: var(--verde);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .btn-entrar {
      width: 100%;
      padding: 14px;
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: filter 0.15s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(37,99,235,0.28);
    }

    .btn-entrar:hover:not(:disabled)  { filter: brightness(1.08); }
    .btn-entrar:active:not(:disabled) { transform: scale(0.98); }
    .btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; }

    .rodape-card {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--tx3);
      line-height: 1.6;
    }

    /* tela de recuperação */
    .tela-recuperacao { display: none; }

    .btn-voltar {
      background: none;
      border: none;
      color: var(--azul);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-voltar:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">

  <!-- TELA DE LOGIN -->
  <div id="tela-login">
    <div class="logo-area">
      <div class="logo-icone">🍽️</div>
      <div class="logo-titulo">Área do Gestor</div>
      <div class="logo-subtitulo">RC Sobradinho · GDF</div>
    </div>

    <div class="erro-msg"  id="erroMsg"></div>

    <div class="form-grupo">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="form-grupo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') entrar()">
      <a class="esqueceu" onclick="mostrarRecuperacao()">Esqueci minha senha</a>
    </div>

    <button class="btn-entrar" id="btnEntrar" onclick="entrar()">Entrar</button>

    <div class="rodape-card">
      Acesso restrito a gestores autorizados.<br>
      🔒 Conexão segura via Supabase Auth
    </div>
  </div>

  <!-- TELA DE RECUPERAÇÃO DE SENHA -->
  <div class="tela-recuperacao" id="tela-recuperacao">
    <button class="btn-voltar" onclick="voltarLogin()">← Voltar ao login</button>

    <div class="logo-area" style="margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:8px">📧</div>
      <div class="logo-titulo" style="font-size:17px">Recuperar senha</div>
      <div class="logo-subtitulo">Enviaremos um link para seu e-mail</div>
    </div>

    <div class="sucesso-msg" id="sucessoRecuperacao"></div>
    <div class="erro-msg"   id="erroRecuperacao"></div>

    <div class="form-grupo">
      <label for="emailRecuperacao">E-mail cadastrado</label>
      <input type="email" id="emailRecuperacao" placeholder="seu@email.com"
             onkeydown="if(event.key==='Enter') recuperarSenha()">
    </div>

    <button class="btn-entrar" id="btnRecuperar" onclick="recuperarSenha()">
      Enviar link de recuperação
    </button>
  </div>

</div>

<script>
  // ═══════════════════════════════════════════════════
  //  ⚠️  COLE AQUI AS SUAS CREDENCIAIS DO SUPABASE
  // ═══════════════════════════════════════════════════
  const SUPABASE_URL = 'https://XXXX.supabase.co';
  const SUPABASE_KEY = 'COLE_AQUI_A_SUA_ANON_KEY';
  // ═══════════════════════════════════════════════════

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Se já logado, redireciona direto
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard_supabase.html';
  })();

  async function entrar() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const erroEl = document.getElementById('erroMsg');
    const btnEl  = document.getElementById('btnEntrar');
    erroEl.style.display = 'none';

    if (!email || !senha) {
      erroEl.textContent  = '⚠️ Preencha e-mail e senha.';
      erroEl.style.display = 'block';
      return;
    }

    btnEl.disabled    = true;
    btnEl.textContent = 'Entrando…';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

    if (error) {
      erroEl.textContent = error.message.includes('Invalid')
        ? '❌ E-mail ou senha incorretos.'
        : `❌ ${error.message}`;
      erroEl.style.display = 'block';
      btnEl.disabled    = false;
      btnEl.textContent = 'Entrar';
      return;
    }

    // Verifica se o usuário tem perfil ativo
    const { data: perfil } = await sb.from('perfis')
      .select('*').eq('id', data.user.id).single();

    if (!perfil || !perfil.ativo) {
      await sb.auth.signOut();
      erroEl.textContent  = '❌ Usuário sem acesso ativo. Contate o administrador.';
      erroEl.style.display = 'block';
      btnEl.disabled    = false;
      btnEl.textContent = 'Entrar';
      return;
    }

    window.location.href = 'dashboard_supabase.html';
  }

  function mostrarRecuperacao() {
    document.getElementById('tela-login').style.display       = 'none';
    document.getElementById('tela-recuperacao').style.display = 'block';
    document.getElementById('emailRecuperacao').value =
      document.getElementById('email').value;
  }

  function voltarLogin() {
    document.getElementById('tela-recuperacao').style.display = 'none';
    document.getElementById('tela-login').style.display       = 'block';
  }

  async function recuperarSenha() {
    const email  = document.getElementById('emailRecuperacao').value.trim();
    const erroEl = document.getElementById('erroRecuperacao');
    const okEl   = document.getElementById('sucessoRecuperacao');
    const btnEl  = document.getElementById('btnRecuperar');
    erroEl.style.display = 'none';
    okEl.style.display   = 'none';

    if (!email) {
      erroEl.textContent  = '⚠️ Informe o e-mail cadastrado.';
      erroEl.style.display = 'block';
      return;
    }

    btnEl.disabled    = true;
    btnEl.textContent = 'Enviando…';

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });

    if (error) {
      erroEl.textContent  = `❌ ${error.message}`;
      erroEl.style.display = 'block';
    } else {
      okEl.textContent  = `✅ Link enviado para ${email}. Verifique sua caixa de entrada.`;
      okEl.style.display = 'block';
    }

    btnEl.disabled    = false;
    btnEl.textContent = 'Enviar link de recuperação';
  }
</script>
</body>
</html>
