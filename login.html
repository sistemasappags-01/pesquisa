<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RC Sobradinho</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/img/logo_sistema.svg">
  <link rel="icon" type="image/x-icon"  href="/img/favicon_sistema.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --azul:       #1a3a6e;
      --azul-dark:  #0f2650;
      --gold:        #f5c842;
      --azul-foco:  rgba(26,58,110,0.16);
      --page-bg:    #eef2f9;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --tx1:        #0f172a;
      --tx2:        #475569;
      --tx3:        #94a3b8;
      --erro-bg:    #fff1f2;
      --erro-border:#fda4af;
      --erro-tx:    #be123c;
      --verde:      #059669;
      --shadow:     0 4px 24px rgba(26,58,110,0.14), 0 1px 4px rgba(0,0,0,0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --azul:       #4a90d9;
        --azul-dark:  #1e3a6e;
        --gold:        #f5c842;
        --page-bg:    #0a0f1e;
        --surface:   #18181b;
        --border:    #3f3f46;
        --tx1:       #fafafa;
        --tx2:        #9ca3af;
        --tx3:       #52525b;
        --erro-bg:   #1c0a0e;
        --erro-border:#9f1239;
        --erro-tx:   #fda4af;
        --verde:     #34d399;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--tx1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border-radius: 16px;
      font-size: 30px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(26,58,110,0.28);
    }

    .logo-titulo {
      font-size: 20px;
      font-weight: 700;
      color: var(--tx1);
      margin-bottom: 3px;
      letter-spacing: -0.3px;
    }

    .logo-subtitulo {
      font-size: 12.5px;
      color: var(--tx3);
    }

    .form-grupo {
      margin-bottom: 16px;
    }

    .form-grupo label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--tx2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-grupo input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--tx1);
      background: var(--page-bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-grupo input::placeholder { color: var(--tx3); }

    .form-grupo input:focus {
      border-color: var(--azul);
      box-shadow: 0 0 0 3px var(--azul-foco);
      background: var(--surface);
    }

    .esqueceu {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--azul);
      font-weight: 500;
      margin-top: 6px;
      cursor: pointer;
      text-decoration: none;
    }

    .esqueceu:hover { text-decoration: underline; }

    .erro-msg {
      display: none;
      background: var(--erro-bg);
      border: 1.5px solid var(--erro-border);
      color: var(--erro-tx);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .sucesso-msg {
      display: none;
      background: rgba(5,150,105,0.08);
      border: 1.5px solid rgba(5,150,105,0.25);
      color: var(--verde);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    .btn-entrar {
      width: 100%;
      padding: 14px;
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: filter 0.15s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(26,58,110,0.28);
    }

    .btn-entrar:hover:not(:disabled)  { filter: brightness(1.08); }
    .btn-entrar:active:not(:disabled) { transform: scale(0.98); }
    .btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; }

    .rodape-card {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--tx3);
      line-height: 1.6;
    }

    /* tela de recuperação */
    .tela-recuperacao { display: none; }

    .btn-voltar {
      background: none;
      border: none;
      color: var(--azul);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-voltar:hover { text-decoration: underline; }

  </style>
</head>
<body>

<div class="card">

  <!-- TELA DE LOGIN -->
  <div id="tela-login">
    <div class="logo-area">
      <!-- Logo carregada do arquivo externo -->
      <img src="logo_sistema.svg"
           width="80" height="80"
           alt="Logo do Sistema"
           style="margin-bottom:14px;display:block;margin-left:auto;margin-right:auto;filter:drop-shadow(0 4px 10px rgba(15,38,80,0.35));"
           onerror="this.style.display='none'">
      <div class="logo-titulo">Área do Gestor</div>
      <div class="logo-subtitulo">RC Sobradinho · GDF</div>
    </div>

    <div class="erro-msg"  id="erroMsg"></div>

    <div class="form-grupo">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="form-grupo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') entrar()">
      <a class="esqueceu" onclick="mostrarRecuperacao()">Esqueci minha senha</a>
    </div>

    <button class="btn-entrar" id="btnEntrar" onclick="entrar()">Entrar</button>

    <div class="rodape-card">
      Acesso restrito a gestores autorizados.<br>
      🔒 Conexão segura via Supabase Auth
    </div>
  </div>

  <!-- TELA DE RECUPERAÇÃO DE SENHA -->
  <div class="tela-recuperacao" id="tela-recuperacao">
    <button class="btn-voltar" onclick="voltarLogin()">← Voltar ao login</button>

    <div class="logo-area" style="margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:8px">📧</div>
      <div class="logo-titulo" style="font-size:17px">Recuperar senha</div>
      <div class="logo-subtitulo">Enviaremos um link para seu e-mail</div>
    </div>

    <div class="sucesso-msg" id="sucessoRecuperacao"></div>
    <div class="erro-msg"   id="erroRecuperacao"></div>

    <div class="form-grupo">
      <label for="emailRecuperacao">E-mail cadastrado</label>
      <input type="email" id="emailRecuperacao" placeholder="seu@email.com"
             onkeydown="if(event.key==='Enter') recuperarSenha()">
    </div>

    <button class="btn-entrar" id="btnRecuperar" onclick="recuperarSenha()">
      Enviar link de recuperação
    </button>
  </div>


<script>
  // ═══════════════════════════════════════════════════
  //  ⚠️  COLE AQUI AS SUAS CREDENCIAIS DO SUPABASE
  // ═══════════════════════════════════════════════════
  const SUPABASE_URL = 'https://kosiqdzgyutdsexclzvk.supabase.co'; // ← substitua pela sua URL
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtvc2lxZHpneXV0ZHNleGNsenZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjQyMTIsImV4cCI6MjA5MzAwMDIxMn0.Aq4ZExIo8O82eB0B2-t8Nh-NyBfCm3sb1vRhutlLOFo'; // ← substitua pela sua anon key
  // ═══════════════════════════════════════════════════

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Verifica parâmetro de erro na URL (ex: ?erro=inativo)
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('erro') === 'inativo') {
    const erroEl = document.getElementById('erroMsg');
    erroEl.textContent  = '❌ Seu acesso está inativo. Contate o administrador.';
    erroEl.style.display = 'block';
  }

  // Se já logado, redireciona direto para o dashboard
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard_supabase.html';
  })();

  async function entrar() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const erroEl = document.getElementById('erroMsg');
    const btnEl  = document.getElementById('btnEntrar');
    erroEl.style.display = 'none';

    if (!email || !senha) {
      erroEl.textContent  = '⚠️ Preencha e-mail e senha.';
      erroEl.style.display = 'block';
      return;
    }

    btnEl.disabled    = true;
    btnEl.textContent = 'Entrando…';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

    if (error) {
      const msg = error.message || '';
      if (msg.includes('Invalid login credentials') || msg.includes('invalid_credentials')) {
        erroEl.textContent = '❌ E-mail ou senha incorretos.';
      } else if (msg.includes('Email not confirmed')) {
        erroEl.textContent = '❌ E-mail não confirmado. Verifique sua caixa de entrada.';
      } else if (msg.includes('Too many requests')) {
        erroEl.textContent = '⏳ Muitas tentativas. Aguarde alguns minutos.';
      } else if (!SUPABASE_URL || SUPABASE_URL.includes('COLE_SUA')) {
        erroEl.textContent = '⚠️ Credenciais do Supabase não configuradas no arquivo login.html.';
      } else {
        erroEl.textContent = `❌ ${msg}`;
      }
      erroEl.style.display = 'block';
      btnEl.disabled    = false;
      btnEl.textContent = 'Entrar';
      return;
    }

    // Aguarda a sessão ser propagada e usa o token autenticado explicitamente
    const token = data.session.access_token;

    const { data: perfil, error: erroPerfil } = await fetch(
      `${SUPABASE_URL}/rest/v1/perfis?id=eq.${data.user.id}&select=*`,
      {
        headers: {
          'apikey':        SUPABASE_KEY,
          'Authorization': `Bearer ${token}`,
          'Accept':        'application/json'
        }
      }
    ).then(r => r.json()).then(rows => ({
      data: rows && rows.length > 0 ? rows[0] : null,
      error: null
    })).catch(e => ({ data: null, error: e }));

    if (!perfil || !perfil.ativo) {
      await sb.auth.signOut();
      erroEl.textContent  = '❌ Usuário sem acesso ativo. Contate o administrador.';
      erroEl.style.display = 'block';
      btnEl.disabled    = false;
      btnEl.textContent = 'Entrar';
      return;
    }

    window.location.href = 'dashboard_supabase.html';
  }

  function mostrarRecuperacao() {
    document.getElementById('tela-login').style.display       = 'none';
    document.getElementById('tela-recuperacao').style.display = 'block';
    document.getElementById('emailRecuperacao').value =
      document.getElementById('email').value;
  }

  function voltarLogin() {
    document.getElementById('tela-recuperacao').style.display = 'none';
    document.getElementById('tela-login').style.display       = 'block';
  }

  async function recuperarSenha() {
    const email  = document.getElementById('emailRecuperacao').value.trim();
    const erroEl = document.getElementById('erroRecuperacao');
    const okEl   = document.getElementById('sucessoRecuperacao');
    const btnEl  = document.getElementById('btnRecuperar');
    erroEl.style.display = 'none';
    okEl.style.display   = 'none';

    if (!email) {
      erroEl.textContent  = '⚠️ Informe o e-mail cadastrado.';
      erroEl.style.display = 'block';
      return;
    }

    btnEl.disabled    = true;
    btnEl.textContent = 'Enviando…';

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });

    if (error) {
      erroEl.textContent  = `❌ ${error.message}`;
      erroEl.style.display = 'block';
    } else {
      okEl.textContent  = `✅ Link enviado para ${email}. Verifique sua caixa de entrada.`;
      okEl.style.display = 'block';
    }

    btnEl.disabled    = false;
    btnEl.textContent = 'Enviar link de recuperação';
  }
</script>
</body>
</html>
